services:
  sentra:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - agent_data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./data/agent_auditor.db
    restart: unless-stopped

volumes:
  agent_data:
