<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Action Auditor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">🛡️ Agent Action Auditor</a>
      <div class="navbar-nav ms-auto align-items-center gap-2">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link" href="/payloads">Payloads</a>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');

    function getEffectiveTheme() {
      return html.getAttribute('data-theme') || 'dark';
    }

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('aa-theme', theme);
      const isDark = theme === 'dark';
      toggle.textContent = isDark ? '☀️' : '🌙';
    }

    function toggleTheme() {
      setTheme(getEffectiveTheme() === 'dark' ? 'light' : 'dark');
      updateThemeColors();
    }

    function updateThemeColors() {
      const isDark = getEffectiveTheme() === 'dark';
      document.querySelector('meta[name="theme-color"]')?.setAttribute('content', isDark ? '#0a0e17' : '#ffffff');
    }

    const saved = localStorage.getItem('aa-theme') || 'dark';
    setTheme(saved);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
