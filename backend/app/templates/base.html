<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Action Auditor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="page-transition" id="pageTransition"></div>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">🛡️ Agent Action Auditor</a>
      <div class="navbar-nav ms-auto align-items-center gap-2">
        <a class="nav-link" href="/">Dashboard <span class="kbd-hint">⌘D</span></a>
        <a class="nav-link" href="/payloads">Payloads <span class="kbd-hint">⌘P</span></a>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">☀️</button>
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const saved = localStorage.getItem('aa-theme') || 'dark';

    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('aa-theme', theme);
      if (toggle) toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    function toggleTheme() { setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    setTheme(saved);

    function showToast(message, icon) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast-custom';
      t.innerHTML = '<span class="toast-icon">' + (icon || '✅') + '</span><span>' + message + '</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>';
      c.appendChild(t);
      setTimeout(() => { if (t.parentElement) t.remove(); }, 3500);
    }

    document.addEventListener('keydown', function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'd') { e.preventDefault(); transitionTo('/'); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'p') { e.preventDefault(); transitionTo('/payloads'); }
      if (e.key === 'Escape') { document.querySelectorAll('.toast-custom').forEach(t => t.remove()); }
    });

    function transitionTo(url) {
      const overlay = document.getElementById('pageTransition');
      overlay.classList.add('active');
      setTimeout(() => { window.location.href = url; }, 200);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('pageTransition');
      if (overlay) setTimeout(() => overlay.classList.remove('active'), 50);
    });

    document.querySelectorAll('.btn:not(.no-ripple)').forEach(btn => {
      btn.classList.add('ripple-btn');
      btn.addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const r = document.createElement('span');
        r.className = 'ripple';
        const size = Math.max(rect.width, rect.height);
        r.style.width = r.style.height = size + 'px';
        r.style.left = (e.clientX - rect.left - size / 2) + 'px';
        r.style.top = (e.clientY - rect.top - size / 2) + 'px';
        this.appendChild(r);
        setTimeout(() => r.remove(), 600);
      });
    });

    document.querySelectorAll('.tilt-card').forEach(card => {
      card.addEventListener('mousemove', function(e) {
        const rect = this.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        this.style.transform = `perspective(600px) rotateY(${x * 6}deg) rotateX(${-y * 6}deg) translateY(-4px)`;
      });
      card.addEventListener('mouseleave', function() {
        this.style.transform = 'perspective(600px) rotateY(0deg) rotateX(0deg) translateY(0px)';
      });
    });

    document.querySelectorAll('.magnetic-wrap').forEach(wrap => {
      const btn = wrap.querySelector('.btn');
      if (!btn) return;
      wrap.addEventListener('mousemove', function(e) {
        const rect = this.getBoundingClientRect();
        const x = (e.clientX - rect.left - rect.width / 2) * 0.3;
        const y = (e.clientY - rect.top - rect.height / 2) * 0.3;
        btn.style.transform = `translate(${x}px, ${y}px)`;
      });
      wrap.addEventListener('mouseleave', function() {
        btn.style.transform = 'translate(0, 0)';
      });
    });

    document.querySelectorAll('a:not(.no-transition)').forEach(a => {
      if (a.hostname === location.hostname && !a.hasAttribute('download')) {
        a.addEventListener('click', function(e) {
          if (e.metaKey || e.ctrlKey || this.target === '_blank') return;
          e.preventDefault();
          transitionTo(this.href);
        });
      }
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
